name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Check Python syntax
        run: |
          python -c "import ast, pathlib; files=list(pathlib.Path('src').rglob('*.py')); [ast.parse(f.read_text(encoding='utf-8'), filename=str(f)) for f in files]; print(f'AST syntax check passed for {len(files)} files')"

      - name: Validate example JSON files
        run: |
          python -m json.tool examples/example_output.json > /tmp/example_output.json
          python -m json.tool examples/trajectory_intent_example.json > /tmp/trajectory_intent_example.json

  demo:
    name: Demo and API (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install demo and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[demo,test]"

      - name: Run demo, Streamlit, and API tests
        run: python -m unittest discover -s tests -v

      - name: Check Python syntax
        run: |
          python -c "import ast, pathlib; files=list(pathlib.Path('src').rglob('*.py')); [ast.parse(f.read_text(encoding='utf-8'), filename=str(f)) for f in files]; print(f'AST syntax check passed for {len(files)} files')"
